name: Deploy Supabase Edge Functions

# Deploys the EverDream edge functions from CI (GitHub's runners), so it works
# regardless of your local machine's CPU/CLI compatibility.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_ACCESS_TOKEN  - https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID    - your project ref (e.g. mtlzwatqgqtxuqdqvoxt)
#
# Functions deploy JWT-protected per ed.app.new/supabase/config.toml.
# Set the provider API keys separately as Supabase edge-function secrets
# (Dashboard -> Edge Functions -> Secrets), not here.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'ed.app.new/supabase/functions/**'
      - 'ed.app.new/supabase/config.toml'
      - '.github/workflows/deploy-edge-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    defaults:
      run:
        working-directory: ed.app.new
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sanity-check secrets are present
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$PROJECT_ID" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN and/or SUPABASE_PROJECT_ID repo secrets."
            exit 1
          fi

      - name: Deploy edge functions
        run: |
          set -e
          for fn in analyze-dream generate-image transcribe-audio health-check; do
            echo "▶  Deploying $fn ..."
            supabase functions deploy "$fn" --project-ref "$PROJECT_ID"
          done
          echo "✅ All edge functions deployed."
