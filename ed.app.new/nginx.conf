server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Service worker + manifest must never be cached, so PWA updates land
    location = /sw.js            { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /registerSW.js    { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /index.html       { add_header Cache-Control "no-cache"; }

    # Fingerprinted build assets can be cached aggressively
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback (app is hash-routed, but this keeps any direct path working)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
